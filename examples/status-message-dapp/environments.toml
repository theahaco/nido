# stellar-scaffold environment configuration.
#
# The active environment is chosen by STELLAR_SCAFFOLD_ENV in `.env`
# (`development` by default). For each `client = true` contract, scaffold
# builds the contract from source under `contracts/`, deploys it to the
# selected network, generates a TS client NPM package under `packages/`, and
# imports it for the frontend in `src/contracts/`.
#
# `status-message` has no `__constructor`, so no `constructor_args` are needed.

### Development — local network (auto-started container)
[development.network]
rpc-url = "http://localhost:8000/rpc"
network-passphrase = "Standalone Network ; February 2017"
run-locally = true

[[development.accounts]]
name = "me"
default = true

[development.contracts]
status_message = { client = true }

### Testing — Stellar testnet. Builds & deploys the contract from source.
[testing.network]
rpc-url = "https://soroban-testnet.stellar.org"
network-passphrase = "Test SDF Network ; September 2015"

[[testing.accounts]]
name = "testnet-user"
default = true

[testing.contracts]
status_message = { client = true }

### Staging — bind an already-deployed testnet contract by id.
[staging.network]
rpc-url = "https://soroban-testnet.stellar.org"
network-passphrase = "Test SDF Network ; September 2015"

[[staging.accounts]]
name = "testnet-user"
default = true

[staging.contracts]
status_message = { id = "CBXVJXHPSYORSAHPX4I6NYPQMDJWK2STQCE6JTIM7FNV4OZSIDJFGNDM" }

### Production — mainnet, bind by id.
[production.network]
rpc-url = "https://mainnet.sorobanrpc.com"
network-passphrase = "Public Global Stellar Network ; September 2015"

[[production.accounts]]
name = "official-team-account"
default = true

[production.contracts]
# status_message = { id = "C..." }
