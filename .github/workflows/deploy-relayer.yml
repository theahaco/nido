name: deploy-relayer

on:
  push:
    branches: [main, feat/72-relayer-gas-abstraction]  # branch entry is TEMPORARY for PR-phase deploys; drop before merge (plan Task 7)
    paths: ['infra/relayer/**', '.github/workflows/deploy-relayer.yml']  # self-path is TEMPORARY too; drop with the branch entry (plan Task 7)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-relayer
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Load Fly token from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FLY_API_TOKEN: op://theahaco/nido_fly_io/credential

      - name: Deploy
        run: flyctl deploy --config infra/relayer/fly.toml --remote-only --ha=false

      - name: Smoke check
        run: curl -fsS --retry 5 --retry-delay 5 --retry-all-errors https://nido-relayer.fly.dev/api/v1/health
