name: deploy-relayer

on:
  push:
    branches: [main]
    paths: ['infra/relayer/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-relayer
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Load Fly token from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FLY_API_TOKEN: op://theahaco/nido_fly_io/credential

      - name: Deploy
        # The positional dir sets the Docker build context (the Dockerfile's
        # COPY paths are relative to infra/relayer/); flyctl finds fly.toml there.
        run: flyctl deploy infra/relayer --remote-only --ha=false

      - name: Smoke check
        run: curl -fsS --retry 5 --retry-delay 5 --retry-all-errors https://nido.fly.dev/api/v1/health
