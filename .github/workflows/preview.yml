name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/preview.yml'
      # The example-dApp preview (example-preview.yml) points its wallet at
      # THIS PR's pr-N.nido.fyi — so a dApp-only PR still needs the wallet
      # preview deployed alongside.
      - 'examples/status-message-dapp/**'

permissions:
  contents: read
  pull-requests: write

env:
  PAGES_PROJECT: nido

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build workspace packages
        run: npm run build:packages

      - name: Build frontend
        env:
          # Gas abstraction via the self-hosted OZ Relayer (#72). SIM_SOURCE is
          # the relayer's public fund address (simulation-only tx source).
          PUBLIC_RELAYER_URL: https://nido.fly.dev
          PUBLIC_RELAYER_SIM_SOURCE: GAL42RUBXKQSVSJWBXFTBB4GFKMPQXA3SOJVGP6UMRJT2SGEIR63JFK2
        run: npx astro build --root ./packages/frontend

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy packages/frontend/dist/ \
            --project-name "$PAGES_PROJECT" \
            --branch "pr-${{ github.event.pull_request.number }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const previewUrl = `https://pr-${prNum}.nido.fyi`;
            const body = `**Preview deployed!**\n\n${previewUrl}\n\nAccount URLs: \`<contract-address>--pr-${prNum}.nido.fyi\``;

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed!')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }
